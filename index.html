<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The AI Dilemma Test</title>
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(12, 20, 45, 0.82);
      --panel-2: rgba(18, 28, 60, 0.92);
      --text: #f3f7ff;
      --muted: #a8b4d8;
      --cyan: #2fe7ff;
      --cyan-dark: #0fc7df;
      --pink: #ff4fd8;
      --line: rgba(255,255,255,0.08);
      --good: #39ffb6;
      --warn: #ffd166;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(47,231,255,0.10), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(255,79,216,0.10), transparent 25%),
        linear-gradient(180deg, #030611 0%, #071126 100%);
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      padding: 36px 16px 60px;
    }

    .app-shell {
      max-width: 980px;
      margin: 0 auto;
    }

    .title-wrap {
      text-align: center;
      margin-bottom: 20px;
    }

    .instructions {
      line-height: 1.5;
      font-size: 1rem;
    }

    .scenario-body {
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 750px;
    }

    .eyebrow {
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.7rem);
      line-height: 1.04;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-shadow: 0 0 18px rgba(47,231,255,0.18);
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 600;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px 20px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 18px 60px rgba(0,0,0,0.32),
        0 0 40px rgba(47,231,255,0.04);
      backdrop-filter: blur(12px);
    }

    @keyframes clickGlow {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(47,231,255,0);
      }
      50% {
        transform: scale(1.06);
        box-shadow: 0 0 30px rgba(47,231,255,0.9),
                    0 0 60px rgba(255,79,216,0.6);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(47,231,255,0);
      }
    }

    .button-glow {
      animation: clickGlow 0.5s ease;
    }

    .instructions-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 24px;
      align-items: center;
    }

    .instructions-image-box {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .instructions-image-box img {
      width: 100%;
      max-width: 300px;
      height: auto;
      display: block;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
    }

    @media (max-width: 800px) {
      .instructions-layout {
        grid-template-columns: 1fr;
      }

      .instructions-image-box {
        order: -1;
      }

      .instructions-image-box img {
        max-width: 220px;
      }
    }

    .progress-wrap {
      margin: 0 0 20px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      box-shadow: 0 0 16px rgba(47,231,255,0.45);
      transition: width 0.35s ease;
    }

    .screen-title {
      margin: 0 0 14px;
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1.15;
    }

    .lead {
      color: var(--muted);
      font-size: 0.97rem;
      line-height: 1.42;
      margin: 0 0 8px;
    }

    .mandate {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.4;
      margin: 10px 0 14px 0;
    }

    .section-label {
      margin-top: 14px;
      margin-bottom: 6px;
      color: var(--cyan);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .choice-grid {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .choice-btn, .primary-btn, .secondary-btn {
      border: none;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 1rem;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .choice-btn:hover, .primary-btn:hover, .secondary-btn:hover {
      transform: translateY(-1px);
    }

    .choice-btn {
      text-align: left;
      background: linear-gradient(180deg, rgba(47,231,255,0.98), rgba(15,199,223,0.95));
      color: #03101d;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(47,231,255,0.18);
    }

    .choice-title {
      font-weight: 800;
      font-size: 1rem;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .choice-subtext {
      font-weight: 500;
      font-size: 0.95rem;
      line-height: 1.4;
      color: rgba(3,16,29,0.86);
    }

    .button-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .primary-btn {
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      color: #071126;
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(47,231,255,0.16);
    }

    .secondary-btn {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .dim-grid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .dim-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px 18px 16px;
    }

    .dim-card h4 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .lean {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .lean.robots { background: rgba(57,255,182,0.12); color: var(--good); }
    .lean.abacus { background: rgba(255,79,216,0.12); color: #ff9ae9; }
    .lean.balanced { background: rgba(255,209,102,0.12); color: var(--warn); }

    .stat-row {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-top: 10px;
      margin-bottom: 8px;
    }

    .stat-box {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .stat-box .label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-box .value {
      font-size: 1.8rem;
      font-weight: 800;
    }

    .scenario-meta {
      color: var(--cyan);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .scenario-body {
      color: var(--text);
      line-height: 1.48;
      white-space: pre-line;
      font-size: 0.98rem;
      max-width: 900px;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .card { padding: 20px 16px; }
      body { padding: 20px 12px 40px; }
      .choice-btn, .primary-btn, .secondary-btn { width: 100%; }
      .button-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="title-wrap">
      <div class="eyebrow">Analytics and Society</div>
      <h1>THE AI DILEMMA TEST</h1>
      <div class="subtitle">An Interactive AI Ethics Simulator</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <div id="progressLabel">Introduction</div>
        <div id="progressCount">0 / 12</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div id="app" class="card"></div>
  </div>

  <script>
    const introText = `
You have been appointed to an emergency ethics task force at a global gaming and entertainment company.

New AI systems are being rolled out across game design, player analytics, content creation, moderation, and platform governance.

Your mandate is simple, but brutal: make decisions no one else wants to make.

In every case, you will face a hard choice between competing values. No option is clean. No outcome is without cost.

As you decide, the system will evaluate your choices across two layers:
    `.trim();

    const instructionsText = `
There are 12 choices in total.

Each choice contributes to:
• your AI perspective
• your moral reasoning style

Some choices will feel uncomfortable and extreme. That is intentional.

Think carefully, but do not overanalyze.
Trust your judgment and follow your intuition.
`.trim();

    const dimensionDescriptions = {
      agency: {
        name: "Agency / Responsibility",
        robots: "You are willing to delegate major decisions to AI when this improves outcomes. You see advanced systems primarily as tools for performance, even when human control becomes thinner.",
        balanced: "You value AI support, but you hesitate when human authority disappears completely. You are open to delegation, but not without limits.",
        abacus: "You strongly resist handing meaningful power to AI systems in high-stakes domains. For you, human oversight is not optional but a moral boundary."
      },
      bias: {
        name: "Bias / Objectivity",
        robots: "You are willing to tolerate some unfairness when the system still improves aggregate performance. You prioritize overall effectiveness, even when equality is imperfect.",
        balanced: "You recognize that AI can improve decision quality, but you also see fairness failures as morally serious. You are conflicted between optimization and equality.",
        abacus: "You reject the use of systems that reproduce unfairness, even if they perform well overall. For you, discrimination is not a tolerable side effect of efficiency."
      },
      abuse: {
        name: "Abuse / Beneficial Use",
        robots: "You are inclined to permit powerful technologies if they promise significant social benefit. You accept misuse risk as part of innovation.",
        balanced: "You see both the upside and the danger of powerful generative systems. You support use, but only uneasily.",
        abacus: "You are highly sensitive to misuse, manipulation, and escalation. For you, some tools are too dangerous to normalize simply because they are useful."
      },
      copyright: {
        name: "Copyright / Open Access",
        robots: "You favor broad knowledge access, innovation, and intellectual empowerment, even when this weakens traditional control over creative ownership.",
        balanced: "You are torn between creator rights and public benefit. You support innovation, but not at any cost.",
        abacus: "You see intellectual property and consent as moral protections, not bureaucratic obstacles. Innovation does not justify taking what was never freely given."
      },
      jobs: {
        name: "Unemployment / Task Creation",
        robots: "You are prepared to accept labor disruption if the long-term collective gains are high enough. You see economic transition as painful, but potentially justified.",
        balanced: "You accept the promise of AI-driven productivity, but you are uneasy about who pays the price. You want progress, but not abandonment.",
        abacus: "You prioritize protection against displacement, exploitation, and social fracture. For you, efficiency loses legitimacy when it destroys security and dignity."
      },
      surveillance: {
        name: "Surveillance / Security",
        robots: "You are willing to exchange privacy for safety, prediction, and convenience when the benefits are substantial. You see data-driven oversight as potentially justified.",
        balanced: "You understand the appeal of AI-enhanced security and personalization, but you remain wary of permanent visibility and concentrated power.",
        abacus: "You see surveillance and data extraction as deep threats to freedom, autonomy, and democratic life. For you, privacy is not a luxury but a safeguard against domination."
      }
    };

    const scenarios = [
      {
        title: "Scenario 1: The Autonomous Tournament Referee",
        dimension: "agency",
        body: `Competitive esports tournaments are increasingly assisted by AI moderation systems.
A new system can monitor gameplay in real time and automatically detect cheating, rule violations, or unsportsmanlike conduct far faster than human referees.

Developers now propose an upgrade:
If the system detects a violation with high confidence, it could automatically issue penalties or disqualify players without waiting for human confirmation.

Simulations suggest this would make tournaments more fair, faster, and less vulnerable to human bias or corruption.

However, professional players and coaches warn that AI may misinterpret complex situations such as hardware glitches or strategic behavior, and irreversible decisions could damage careers and reputations.

You are part of the tournament governance board deciding whether to adopt the fully autonomous system.`,
        choices: [
          {
            label: "Choice A",
            text: "Adopt autonomous refereeing.",
            subtext: "If AI improves fairness and consistency across global competitions, delegating decisions is justified.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Keep human final authority.",
            subtext: "High-stakes disciplinary decisions should remain a human responsibility, even if the process becomes slower.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      },
      {
        title: "Scenario 2: The Anti-Cheat Panopticon",
        dimension: "surveillance",
        body: `A major multiplayer gaming platform struggles with organized cheating networks.
To restore trust, the company proposes an AI anti-cheat system that continuously monitors player behavior, voice chat patterns, and device usage.

The system could track suspicious activity across matches and automatically flag or suspend users.

Supporters argue this would dramatically improve game integrity and player safety.

Critics warn that constant behavioral monitoring creates a culture of permanent surveillance where legitimate players may feel watched and profiled.

The platform must decide whether to implement the system.`,
        choices: [
          {
            label: "Choice A",
            text: "Implement full monitoring.",
            subtext: "If it protects competitive fairness and reduces toxicity, extensive data tracking is acceptable.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Limit monitoring.",
            subtext: "Players should not sacrifice autonomy and privacy simply to improve platform control.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      },
      {
        title: "Scenario 3: The Ranking Algorithm Everyone Uses",
        dimension: "bias",
        body: `A leading esports analytics company sells an AI ranking system used by teams to recruit players.

The system predicts performance potential based on gameplay history, reaction speed metrics, and online match statistics.

During an internal review, you discover that players from certain regions consistently receive slightly lower scores due to differences in server latency and data availability.

Fixing the issue would reduce prediction accuracy and may push teams toward competitor tools.

You are part of the leadership team deciding what to do.`,
        choices: [
          {
            label: "Choice A",
            text: "Keep the system unchanged.",
            subtext: "Even imperfect tools can still improve team performance and industry efficiency.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Publicly address and correct the bias.",
            subtext: "Allowing known unfairness to persist would be ethically unacceptable.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      },
      {
        title: "Scenario 4: The Perfect Game Designer",
        dimension: "agency",
        body: `A game studio develops an AI system that automatically designs levels, difficulty curves, and reward systems based on player data.

The system produces highly engaging experiences and increases revenue significantly.

However, designers argue that creative judgment and emotional storytelling risk being replaced by algorithmic optimization.

The studio must decide how much creative authority to delegate.`,
        choices: [
          {
            label: "Choice A",
            text: "Let AI design major content.",
            subtext: "If players enjoy the result and the company thrives, automation of design decisions is justified.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Preserve human creative control.",
            subtext: "Games are cultural products, creativity should not be reduced to behavioral optimization.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      },
      {
        title: "Scenario 5: The Real-Time Toxicity Filter",
        dimension: "abuse",
        body: `A VR social gaming platform introduces an AI moderation tool that can mute or remove players instantly when harmful speech or harassment is detected.

The system could create safer environments, especially for younger players.

However, critics argue that context matters, sarcasm, jokes, or heated competition may be misinterpreted.

The company must decide whether to activate automatic enforcement.`,
        choices: [
          {
            label: "Choice A",
            text: "Activate automatic moderation.",
            subtext: "Protecting community well-being outweighs the risk of occasional false penalties.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Keep moderation human-reviewed.",
            subtext: "Social interaction should not be governed by automated judgment alone.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      },
      {
        title: "Scenario 6: The Addictive Engagement Engine",
        dimension: "abuse",
        body: `A mobile gaming company uses AI to personalize reward timing, visual stimuli, and difficulty adjustments to maximize player engagement.

Revenue grows rapidly.

But internal researchers warn that some mechanics may encourage compulsive play patterns among vulnerable users.

Executives must decide whether to continue deploying the system.`,
        choices: [
          {
            label: "Choice A",
            text: "Continue optimization.",
            subtext: "If players voluntarily participate and the industry innovates, engagement design is acceptable.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Restrict the system.",
            subtext: "Designing experiences that intentionally exploit psychological vulnerabilities is ethically problematic.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      },
      {
        title: "Scenario 7: The AI Matchmaking Authority",
        dimension: "agency",
        body: `An esports league considers allowing an AI system to decide tournament seeding, match pairings, and qualification eligibility.

The system would remove accusations of favoritism and improve competitive balance.

However, teams worry that opaque algorithmic decisions could determine careers without appeal.

The league must choose.`,
        choices: [
          {
            label: "Choice A",
            text: "Delegate competitive structuring to AI.",
            subtext: "Objective optimization improves fairness at scale.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Keep human governance structures.",
            subtext: "Transparency and accountability matter more than pure efficiency.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      },
      {
        title: "Scenario 8: The Generated Skin Marketplace",
        dimension: "copyright",
        body: `A generative AI tool allows players to create custom skins and music tracks in the visual and audio style of famous game artists.

User creativity explodes.

But original creators claim their aesthetic identity is being copied without consent.

The platform must decide how to regulate the tool.`,
        choices: [
          {
            label: "Choice A",
            text: "Allow open generation.",
            subtext: "Innovation and creative participation should not be restricted by rigid ownership rules.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Require creator consent.",
            subtext: "Artistic style and digital identity deserve protection.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      },
      {
        title: "Scenario 9: The Automation Ultimatum: Game Edition",
        dimension: "jobs",
        body: `A major studio announces it can replace large parts of QA testing, dialogue writing, and environment design with AI tools.

Production costs would fall dramatically.

But thousands of industry jobs may disappear.

Governments consider whether to regulate the transition.`,
        choices: [
          {
            label: "Choice A",
            text: "Allow full automation.",
            subtext: "Industry competitiveness and technological progress justify disruption.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Slow implementation.",
            subtext: "Societal stability should not be sacrificed for efficiency.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      },
      {
        title: "Scenario 10: The Algorithmic Performance Reviewer",
        dimension: "agency",
        body: `A streaming platform introduces an AI system that evaluates creators’ content quality and automatically decides monetization eligibility.

The system improves consistency and scalability.

However, creators argue that unconventional or experimental content may be unfairly penalized.`,
        choices: [
          {
            label: "Choice A",
            text: "Adopt AI evaluation.",
            subtext: "Standardized assessment ensures fairness across millions of creators.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Keep human review panels.",
            subtext: "Creative expression cannot be fully captured by metrics.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      },
      {
        title: "Scenario 11: The Behavioral Economy Tracker",
        dimension: "surveillance",
        body: `A game publisher proposes tracking player spending habits, emotional reactions, and playtime patterns across titles to predict churn and personalize offers.

Supporters say this improves player experience and reduces financial risk.

Critics warn it creates deep behavioral profiling.`,
        choices: [
          {
            label: "Choice A",
            text: "Implement full tracking.",
            subtext: "Data-driven personalization benefits both players and business sustainability.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Limit behavioral analytics.",
            subtext: "Players should not be treated as predictable data objects.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      },
      {
        title: "Scenario 12: The Health & Performance Wearables",
        dimension: "surveillance",
        body: `Professional esports organizations consider requiring players to wear biometric devices that track stress levels, sleep, and reaction patterns.

The AI system could prevent burnout and optimize performance.

But players fear loss of bodily privacy and contractual pressure.`,
        choices: [
          {
            label: "Choice A",
            text: "Require wearables.",
            subtext: "If health risks decrease and performance improves, monitoring is justified.",
            side: "robots",
            ethics: "utilitarian"
          },
          {
            label: "Choice B",
            text: "Keep participation voluntary.",
            subtext: "Athletes must retain control over intimate personal data.",
            side: "abacus",
            ethics: "deontological"
          }
        ]
      }
    ];

    let currentScreen = "intro";
    let currentScenario = 0;
    const answers = [];

    function updateProgress() {
      const fill = document.getElementById("progressFill");
      const label = document.getElementById("progressLabel");
      const count = document.getElementById("progressCount");

      if (currentScreen === "intro") {
        fill.style.width = "0%";
        label.textContent = "Introduction";
        count.textContent = "0 / 12";
      } else if (currentScreen === "instructions") {
        fill.style.width = "0%";
        label.textContent = "Instructions";
        count.textContent = "0 / 12";
      } else if (currentScreen === "scenario") {
        const shown = currentScenario + 1;
        fill.style.width = `${(currentScenario / scenarios.length) * 100}%`;
        label.textContent = scenarios[currentScenario].title;
        count.textContent = `${shown} / ${scenarios.length}`;
      } else if (currentScreen === "results") {
        fill.style.width = "100%";
        label.textContent = "Results";
        count.textContent = `${scenarios.length} / ${scenarios.length}`;
      }
    }

    function renderIntro() {
      currentScreen = "intro";
      updateProgress();

      document.getElementById("app").innerHTML = `
        <h2 class="screen-title">You have been appointed to an emergency ethics task force at a global gaming and entertainment company.</h2>

        <p class="lead">
          New AI systems are being rolled out across game design, player analytics, content creation, moderation, and platform governance.
        </p>

        <p class="mandate">
Your mandate is simple, but brutal: make decisions no one else wants to make.
</p>

        <p class="lead">
          In every case, you will face a hard choice between competing values. No option is clean. No outcome is without cost.
        </p>

        <p class="lead">
          As you decide, the system will evaluate your choices across two layers:
        </p>

        <div class="section-label">1. Your AI Governance Profile</div>
        <p class="lead">
          Artificial intelligence is often seen as both a promise and a risk.
        </p>
        <p class="lead">
          In this simulation, these perspectives are represented by two lenses:
        </p>
        <p class="lead">
          <strong>ROBOTS:</strong> emphasizing the opportunities and benefits of AI.<br>
          <strong>ABACUS:</strong> emphasizing the risks and ethical challenges of AI.
        </p>
        <p class="lead">
          Your choices throughout the scenarios will reveal which perspective your decisions lean toward. After completing the simulation, the full meaning of these frameworks will be revealed.
        </p>

        <div class="section-label">2. Your Moral Reasoning Profile</div>
        <p class="lead">
          Do you tend to justify decisions through:
        </p>
        <p class="lead">
          <strong>Utilitarian reasoning:</strong> maximizing overall welfare and outcomes<br>
          <strong>Deontological reasoning:</strong> protecting rights, duties, and moral limits even when outcomes suffer
        </p>

        <p class="lead">
          <strong>You are not being tested on what is “correct”.</strong><br>
          The question is which values you prioritize when difficult trade-offs arise.
        </p>

        <div class="button-row">
          <button class="primary-btn" onclick="beginSimulation(this)">Press Begin</button>
        </div>
      `;
    }

    function renderInstructions() {
      currentScreen = "instructions";
      updateProgress();

      document.getElementById("app").innerHTML = `
        <div class="instructions-layout">
          <div>
            <h2 class="screen-title">Instructions</h2>
            <p class="lead">${instructionsText.replace(/\n/g, "<br>")}</p>
            <div class="button-row">
              <button class="secondary-btn" onclick="renderIntro()">Back</button>
              <button class="primary-btn" onclick="startFirstScenario(this)">Start Scenario 1</button>
            </div>
          </div>

          <div class="instructions-image-box">
            <img src="images_AI_image_introduction.jpeg" alt="AI introduction image">
          </div>
        </div>
      `;
    }

    function renderScenario() {
      currentScreen = "scenario";
      updateProgress();

      const s = scenarios[currentScenario];
      document.getElementById("app").innerHTML = `
        <div class="scenario-meta">${s.title}</div>
        <h2 class="screen-title">${dimensionDescriptions[s.dimension].name}</h2>
        <div class="scenario-body">${s.body}</div>

        <div class="choice-grid">
          ${s.choices.map((choice, index) => `
            <button class="choice-btn" onclick="selectChoice(${index})">
              <div class="choice-title">${choice.label}: ${choice.text}</div>
              <div class="choice-subtext">${choice.subtext}</div>
            </button>
          `).join("")}
        </div>
      `;
      window.scrollTo({
        top: 0,
        behavior: "smooth"});
    }

    function selectChoice(index) {
      const s = scenarios[currentScenario];
      const choice = s.choices[index];

      answers.push({
        dimension: s.dimension,
        side: choice.side,
        ethics: choice.ethics
      });

      currentScenario++;

      if (currentScenario < scenarios.length) {
        renderScenario();
      } else {
        renderResults();
      }
    }

    function beginSimulation(btn) {
      btn.disabled = true;
      btn.classList.add("button-glow");
      setTimeout(() => {
        renderInstructions();
      }, 450);
    }

    function startFirstScenario(btn) {
      btn.disabled = true;
      btn.classList.add("button-glow");
      setTimeout(() => {
        renderScenario();
      }, 450);
    }

    function getDimensionResult(dimensionKey) {
      const subset = answers.filter(a => a.dimension === dimensionKey);
      if (subset.length === 0) return "balanced";

      const robotsCount = subset.filter(a => a.side === "robots").length;
      const abacusCount = subset.filter(a => a.side === "abacus").length;

      if (robotsCount > abacusCount) return "robots";
      if (abacusCount > robotsCount) return "abacus";
      return "balanced";
    }

    function renderResults() {
      currentScreen = "results";
      updateProgress();

      const robotsTotal = answers.filter(a => a.side === "robots").length;
      const abacusTotal = answers.filter(a => a.side === "abacus").length;
      const utilTotal = answers.filter(a => a.ethics === "utilitarian").length;
      const deonTotal = answers.filter(a => a.ethics === "deontological").length;

      const utilPercent = Math.round((utilTotal / answers.length) * 100);
      const deonPercent = Math.round((deonTotal / answers.length) * 100);

      let ethicsHeadline = "";
      let ethicsText = "";

      if (utilTotal > deonTotal) {
        ethicsHeadline = "Your moral reasoning leans utilitarian.";
        ethicsText = "Across the scenarios, you tended to justify decisions by their consequences. You were more willing to tolerate discomfort, trade-offs, and the disregard of some individual concerns when doing so appeared to increase overall welfare, safety, or efficiency. In your reasoning, the hardest question is usually: What produces the best outcome for the greatest number?";
      } else if (deonTotal > utilTotal) {
        ethicsHeadline = "Your moral reasoning leans deontological.";
        ethicsText = "Across the scenarios, you tended to emphasize duties, rights, and moral limits. You were less willing to violate core principles such as consent, fairness, human dignity, or non-manipulation, even when doing so might have improved outcomes overall. In your reasoning, the hardest question is usually: What must never be done, even for a good result?";
      } else {
        ethicsHeadline = "Your moral reasoning is evenly split.";
        ethicsText = "You moved between outcome-based and duty-based thinking depending on the context. In some cases, you prioritized welfare and collective benefit; in others, you treated rights and moral boundaries as non-negotiable.";
      }

      const dimensionCards = Object.entries(dimensionDescriptions).map(([key, value]) => {
        const result = getDimensionResult(key);
        const label = result === "robots" ? "ROBOTS leaning" : result === "abacus" ? "ABACUS leaning" : "Balanced";
        return `
          <div class="dim-card">
            <h4>${value.name}</h4>
            <div class="lean ${result}">${label}</div>
            <div class="muted">${value[result]}</div>
          </div>
        `;
      }).join("");

      document.getElementById("app").innerHTML = `
        <h2 class="screen-title">YOUR AI GOVERNANCE PROFILE</h2>

        <div class="stat-row">
          <div class="stat-box">
            <div class="label">ROBOTS choices</div>
            <div class="value">${robotsTotal}</div>
          </div>
          <div class="stat-box">
            <div class="label">ABACUS choices</div>
            <div class="value">${abacusTotal}</div>
          </div>
          <div class="stat-box">
            <div class="label">Utilitarian</div>
            <div class="value">${utilPercent}%</div>
          </div>
          <div class="stat-box">
            <div class="label">Deontological</div>
            <div class="value">${deonPercent}%</div>
          </div>
        </div>

        <div class="section-label">Dimension Breakdown</div>
        <div class="dim-grid">${dimensionCards}</div>

        <div class="section-label">Ethics Result</div>
        <p class="lead"><strong>${ethicsHeadline}</strong></p>
        <p class="lead">${ethicsText}</p>

        <div class="section-label">Closing Reflection</div>
        <p class="lead">
          No profile produced here is “the correct one.”<br>
          That is the point.<br><br>
          The ethics of AI is not a battle between obvious good and obvious evil. It is a struggle between values that often collide: welfare and rights, innovation and restraint, precision and justice, empowerment and control.<br><br>
          You have now seen what kind of trade-offs your own reasoning tends to permit.<br>
          The real question is whether you are comfortable living in the AI system your choices just created.
        </p>

        <div class="button-row">
          <button class="secondary-btn" onclick="restartSimulation()">Restart Simulation</button>
        </div>
      `;
    }

    function restartSimulation() {
      currentScenario = 0;
      answers.length = 0;
      renderIntro();
    }

    renderIntro();
  </script>
</body>
</html>
