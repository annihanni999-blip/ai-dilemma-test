<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The AI Dilemma Test</title>
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(12, 20, 45, 0.82);
      --panel-2: rgba(18, 28, 60, 0.92);
      --text: #f3f7ff;
      --muted: #a8b4d8;
      --cyan: #2fe7ff;
      --cyan-dark: #0fc7df;
      --pink: #ff4fd8;
      --line: rgba(255,255,255,0.08);
      --good: #39ffb6;
      --warn: #ffd166;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(47,231,255,0.10), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(255,79,216,0.10), transparent 25%),
        linear-gradient(180deg, #030611 0%, #071126 100%);
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      padding: 36px 16px 60px;
    }

    .app-shell {
      max-width: 980px;
      margin: 0 auto;
    }

    .title-wrap {
      text-align: center;
      margin-bottom: 20px;
    }

    .instructions {
      line-height: 1.5;
      font-size: 1rem;
    }

    .scenario-body {
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 750px;
    }

    .eyebrow {
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.7rem);
      line-height: 1.04;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-shadow: 0 0 18px rgba(47,231,255,0.18);
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 600;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px 20px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 18px 60px rgba(0,0,0,0.32),
        0 0 40px rgba(47,231,255,0.04);
      backdrop-filter: blur(12px);
    }

    @keyframes clickGlow {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(47,231,255,0);
      }
      50% {
        transform: scale(1.06);
        box-shadow: 0 0 30px rgba(47,231,255,0.9),
                    0 0 60px rgba(255,79,216,0.6);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(47,231,255,0);
      }
    }

    .button-glow {
      animation: clickGlow 0.5s ease;
    }

    .instructions-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 24px;
      align-items: center;
    }

    .instructions-image-box {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .instructions-image-box img {
      width: 100%;
      max-width: 300px;
      height: auto;
      display: block;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
    }

    @media (max-width: 800px) {
      .instructions-layout {
        grid-template-columns: 1fr;
      }

      .instructions-image-box {
        order: -1;
      }

      .instructions-image-box img {
        max-width: 220px;
      }
    }

    .progress-wrap {
      margin: 0 0 20px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      box-shadow: 0 0 16px rgba(47,231,255,0.45);
      transition: width 0.35s ease;
    }

    .screen-title {
      margin: 0 0 14px;
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1.15;
    }

    .lead {
      color: var(--muted);
      font-size: 0.97rem;
      line-height: 1.42;
      margin: 0 0 8px;
    }

    .mandate {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.4;
      margin: 10px 0 14px 0;
    }

    .section-label {
      margin-top: 14px;
      margin-bottom: 6px;
      color: var(--cyan);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .choice-grid {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .choice-btn, .primary-btn, .secondary-btn {
      border: none;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 1rem;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .choice-btn:hover, .primary-btn:hover, .secondary-btn:hover {
      transform: translateY(-1px);
    }

    .choice-btn {
      text-align: left;
      background: linear-gradient(180deg, rgba(47,231,255,0.98), rgba(15,199,223,0.95));
      color: #03101d;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(47,231,255,0.18);
    }

    .choice-title {
      font-weight: 800;
      font-size: 1rem;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .choice-subtext {
      font-weight: 500;
      font-size: 0.95rem;
      line-height: 1.4;
      color: rgba(3,16,29,0.86);
    }

    .button-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .primary-btn {
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      color: #071126;
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(47,231,255,0.16);
    }

    .secondary-btn {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .dim-grid {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .dim-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px 18px 16px;
    }

    .dim-card h4 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .lean {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .lean.robots { background: rgba(57,255,182,0.12); color: var(--good); }
    .lean.abacus { background: rgba(255,79,216,0.12); color: #ff9ae9; }
    .lean.balanced { background: rgba(255,209,102,0.12); color: var(--warn); }

    .stat-row {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-top: 10px;
      margin-bottom: 8px;
    }

    .stat-box {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .stat-box .label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-box .value {
      font-size: 1.8rem;
      font-weight: 800;
    }

    .scenario-meta {
      color: var(--cyan);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .scenario-body {
      color: var(--text);
      line-height: 1.48;
      white-space: pre-line;
      font-size: 0.98rem;
      max-width: 900px;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .card { padding: 20px 16px; }
      body { padding: 20px 12px 40px; }
      .choice-btn, .primary-btn, .secondary-btn { width: 100%; }
      .button-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="title-wrap">
      <div class="eyebrow">Analytics and Society</div>
      <h1>THE AI DILEMMA TEST</h1>
      <div class="subtitle">An Interactive AI Ethics Simulator</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <div id="progressLabel">Introduction</div>
        <div id="progressCount">0 / 12</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div id="app" class="card"></div>
  </div>

  <script>
    const introText = `
You have been appointed to an emergency ethics task force advising the global gaming and entertainment industry.

New AI systems are being rolled out across game design, player analytics, content creation, moderation, and platform governance.

Your mandate is simple, but brutal: make decisions no one else wants to make.

In every case, you will face a hard choice between competing values. No option is clean. No outcome is without cost.

As you decide, the system will evaluate your choices across two layers:
    `.trim();

    const instructionsText = `
There are 12 choices in total.

Each choice contributes to:
• your AI perspective
• your moral reasoning style

Some choices will feel uncomfortable and extreme. That is intentional.

Think carefully, but do not overanalyze.
Trust your judgment and follow your intuition.
`.trim();

    const dimensionDescriptions = {
      agency: {
        name: "Agency / Responsibility",
        robots: "You are willing to delegate major decisions to AI when this improves outcomes. You see advanced systems primarily as tools for performance, even when human control becomes thinner.",
        balanced: "You value AI support, but you hesitate when human authority disappears completely. You are open to delegation, but not without limits.",
        abacus: "You strongly resist handing meaningful power to AI systems in high-stakes domains. For you, human oversight is not optional but a moral boundary."
      },
      bias: {
        name: "Bias / Objectivity",
        robots: "You are willing to tolerate some unfairness when the system still improves aggregate performance. You prioritize overall effectiveness, even when equality is imperfect.",
        balanced: "You recognize that AI can improve decision quality, but you also see fairness failures as morally serious. You are conflicted between optimization and equality.",
        abacus: "You reject the use of systems that reproduce unfairness, even if they perform well overall. For you, discrimination is not a tolerable side effect of efficiency."
      },
      abuse: {
        name: "Abuse / Beneficial Use",
        robots: "You are inclined to permit powerful technologies if they promise significant social benefit. You accept misuse risk as part of innovation.",
        balanced: "You see both the upside and the danger of powerful generative systems. You support use, but only uneasily.",
        abacus: "You are highly sensitive to misuse, manipulation, and escalation. For you, some tools are too dangerous to normalize simply because they are useful."
      },
      copyright: {
        name: "Copyright / Open Access",
        robots: "You favor broad knowledge access, innovation, and intellectual empowerment, even when this weakens traditional control over creative ownership.",
        balanced: "You are torn between creator rights and public benefit. You support innovation, but not at any cost.",
        abacus: "You see intellectual property and consent as moral protections, not bureaucratic obstacles. Innovation does not justify taking what was never freely given."
      },
      jobs: {
        name: "Unemployment / Task Creation",
        robots: "You are prepared to accept labor disruption if the long-term collective gains are high enough. You see economic transition as painful, but potentially justified.",
        balanced: "You accept the promise of AI-driven productivity, but you are uneasy about who pays the price. You want progress, but not abandonment.",
        abacus: "You prioritize protection against displacement, exploitation, and social fracture. For you, efficiency loses legitimacy when it destroys security and dignity."
      },
      surveillance: {
        name: "Surveillance / Security",
        robots: "You are willing to exchange privacy for safety, prediction, and convenience when the benefits are substantial. You see data-driven oversight as potentially justified.",
        balanced: "You understand the appeal of AI-enhanced security and personalization, but you remain wary of permanent visibility and concentrated power.",
        abacus: "You see surveillance and data extraction as deep threats to freedom, autonomy, and democratic life. For you, privacy is not a luxury but a safeguard against domination."
      }
    };

    const scenarios = [
      {
  title: "Scenario 1: Who Referees the Final?",
  dimension: "agency",
  body: `In traditional sports, fans often react strongly to referee assignments. Before major football matches such as Borussia Dortmund vs FC Bayern, supporters sometimes complain that certain referees are biased or make controversial decisions that influence the outcome.

A global esports league now wants to eliminate these disputes entirely.

Organizers propose replacing human referees with an AI officiating system during the championship finals. The system can detect rule violations, suspicious gameplay patterns, and unsportsmanlike behavior in real time. If confidence is high, it could automatically issue penalties or even decide match outcomes without human intervention.

Supporters argue this would finally make competitions truly objective. No favoritism, no emotional pressure, no accusations of corruption.

However, players and coaches worry that something important may be lost. In close situations, human referees can interpret intent, consider context, and allow appeals. With a fully autonomous system, responsibility becomes harder to locate. If an algorithm makes a decisive call, there may be no meaningful way to challenge it before the result becomes official.

The league must decide who should referee the most important matches.`,
  choices: [
    {
      label: "Choice A",
      text: "Adopt AI refereeing.",
      subtext: "Objective and consistent decisions are more important than preserving human authority in high-stakes competition.",
      side: "robots",
      ethics: "utilitarian"
    },
    {
      label: "Choice B",
      text: "Keep human referees in charge.",
      subtext: "Even imperfect human judgment allows responsibility, interpretation, and the possibility to contest decisive rulings.",
      side: "abacus",
      ethics: "deontological"
    }
  ]
},
      {
  title: "Scenario 2: The Esports Panopticon",
  dimension: "surveillance",
  body: `A major global esports league is struggling with cheating scandals and performance-enhancing substance use.

To restore trust, league organizers propose a new AI monitoring system inspired by the idea of the Panopticon (a model of surveillance in which individuals behave differently because they know they might be watched at any time).

Professional players would compete in controlled gaming facilities equipped with smart cameras and behavioral analytics software. The system would monitor gameplay patterns, voice communication, biometric signals, and even movements in physical space to detect possible cheating or doping.

Initially, the technology is introduced as a fairness measure. Supporters argue that constant monitoring would protect competitive integrity and reassure fans, sponsors, and teams.

However, critics warn about “function creep” (the gradual expansion of a technology’s purpose beyond its original goal). What begins as anti-cheating surveillance could later be used to track performance habits, emotional reactions, or contract compliance.

Players worry that they are no longer just competing, but are being continuously analyzed.

The league must decide whether to implement the system.`,
  choices: [
    {
      label: "Choice A",
      text: "Implement the monitoring.",
      subtext: "If constant observation protects fairness and credibility in professional competition, extensive tracking is justified.",
      side: "robots",
      ethics: "utilitarian"
    },
    {
      label: "Choice B",
      text: "Reject continuous AI surveillance.",
      subtext: "Even in high-stakes competition, players should not be subjected to pervasive monitoring systems that normalize permanent observation.",
      side: "abacus",
      ethics: "deontological"
    }
  ]
},
      {
  title: "Scenario 3: The Bachelor Selection Algorithm",
  dimension: "bias",
  body: `A major entertainment network introduces an AI system to help select contestants for its hugely popular dating show “The Bachelors” (a reality format in which two men simultaneously search for romantic partners).

The system analyzes past seasons, audience engagement, social media reactions, and relationship outcomes to predict which applicants will create compelling storylines and strong viewer connection.

Over the last two years, the AI-supported casting process has been considered a major success. Ratings increased, online discussion exploded, and several couples formed on the show are still together today.

However, during a new review, producers discover that the system systematically favors certain types of candidates. Applicants with particular looks, speech patterns, or lifestyle backgrounds are consistently ranked higher because previous audiences engaged more strongly with them.

Correcting the bias would require redesigning the selection model and could make the upcoming season less predictable and potentially less successful.

Some executives argue that the show’s purpose is entertainment, not social fairness. One producer says:

“We are not choosing life partners for the country. We are choosing stories people want to watch.”

You are part of the casting leadership team deciding how to proceed.`,
  choices: [
    {
      label: "Choice A",
      text: "Keep using the AI selection system.",
      subtext: "If the model consistently produces engaging seasons and real relationships, some bias may be an acceptable trade-off.",
      side: "robots",
      ethics: "utilitarian"
    },
    {
      label: "Choice B",
      text: "Redesign the casting process.",
      subtext: "Allowing a system to shape visibility and romantic opportunity in a biased way is ethically problematic, even if it improves ratings.",
      side: "abacus",
      ethics: "deontological"
    }
  ]
},
      {
  title: "Scenario 4: The Perfect Game Designer",
  dimension: "agency",
  body: `A mobile game studio behind a globally successful endless-runner game similar to Temple Run is under pressure to release a major update.

To stay competitive, the company develops an advanced AI design system that can automatically generate new levels, obstacles, reward timing, and difficulty progression by analyzing millions of player interactions.

Early tests are extremely promising. The AI-designed version keeps players engaged longer, increases in-game purchases, and adapts perfectly to individual play styles.

Executives argue this could secure the studio’s market leadership.

However, senior game designers are deeply concerned. They feel that the game is slowly shifting from a creative experience into a purely optimized behavioral loop. Emotional pacing, surprise, and artistic vision risk being replaced by systems that maximize retention and monetization.

Some also fear that if AI takes over core design decisions now, human designers may gradually lose influence or even their roles in future projects.

With competitors already experimenting with similar tools, the studio must decide how much authority to give the AI system.`,
  choices: [
    {
      label: "Choice A",
      text: "Let AI design major game content.",
      subtext: "If players enjoy the experience and the studio survives in a highly competitive market, delegating creative decisions is justified.",
      side: "robots",
      ethics: "utilitarian"
    },
    {
      label: "Choice B",
      text: "Preserve human creative control.",
      subtext: "Games are cultural and artistic products, core design choices should not be reduced to data-driven optimization.",
      side: "abacus",
      ethics: "deontological"
    }
  ]
},
      {
  title: "Scenario 5: The Live Fact Continuum",
  dimension: "abuse",
  body: `A major television and streaming network introduces an experimental AI fact-checking feature for live broadcasts.

During interviews, debates, and entertainment talk shows, a small on-screen scale appears whenever a factual statement is made. The indicator moves along a continuum from “well supported” to “uncertain” to “likely false,” based on available data sources.

Producers believe this system could help audiences navigate complex discussions without interrupting speakers. Instead of cutting in with corrections, the network would simply provide contextual signals in real time.

However, critics argue that public speech often blends facts, interpretations, exaggerations, and emotional positioning. For example, a politician might repeat a viral claim about immigrants “eating people’s pets.” Supporters may argue that the statement is meant to illustrate how extreme the public debate has become, not to assert a literal fact. An automated system could still move the indicator toward “likely false,” shaping audience perception before the intent is clarified.

Journalists worry that such tools could subtly influence which narratives feel credible, even when statements are ambiguous or strategically framed.

The network must decide whether to deploy the real-time fact continuum.`,
  choices: [
    {
      label: "Choice A",
      text: "Deploy the AI fact continuum.",
      subtext: "Providing audiences with real-time signals may improve overall understanding, even if interpretation becomes partially automated.",
      side: "robots",
      ethics: "utilitarian"
    },
    {
      label: "Choice B",
      text: "Avoid algorithmic fact indicators.",
      subtext: "Public discourse should remain open to interpretation rather than being framed instantly by automated credibility judgments.",
      side: "abacus",
      ethics: "deontological"
    }
  ]
},
      {
  title: "Scenario 6: The AI Companion You Can’t Leave",
  dimension: "abuse",
  body: `A mobile gaming company introduces a new AI-powered companion feature inside one of its most popular games.

The system learns from player behavior and adapts dialogue, reward timing, difficulty levels, and emotional responses to keep players engaged. Over time, the AI companion becomes more personalized, supportive, and responsive.

Many players love the feature. Some say the companion helps them cope with loneliness, stress, or social anxiety. Engagement and in-game spending rise sharply.

However, internal researchers raise concerns. Data shows that a subset of players is developing very strong emotional attachment to the AI. Some spend excessive amounts of time and money in the game and report distress when disconnected from the system.

Executives must decide whether to continue deploying and expanding the feature.`,
  choices: [
    {
      label: "Choice A",
      text: "Continue deploying the AI companion system.",
      subtext: "If players voluntarily engage and the feature provides comfort and entertainment, restricting it may do more harm than good.",
      side: "robots",
      ethics: "utilitarian"
    },
    {
      label: "Choice B",
      text: "Restrict or redesign the system.",
      subtext: "Designing experiences that encourage psychological dependence on AI companions raises serious ethical concerns.",
      side: "abacus",
      ethics: "deontological"
    }
  ]
},
      {
  title: "Scenario 7: The Squad That Data Chose",
  dimension: "agency",
  body: `Ahead of the upcoming World Cup, the German Football Association introduces an advanced AI system to support national team selection.

The system analyzes thousands of variables including match performance, injury risk, recovery speed, tactical compatibility, and psychological pressure indicators. In internal trials, AI-selected squads perform statistically better in simulated tournaments.

Officials argue this could finally reduce long-standing problems in football governance: favoritism toward star players, media pressure, and emotional decision-making by coaches.

However, controversy erupts when a highly popular FC Bayern Munich player is excluded from the AI-recommended squad. Despite strong recent performances and massive fan support, the system predicts that his playing style may destabilize team cohesion and increase fatigue risk later in the tournament.

Sponsors quietly express concern that leaving out major stars could reduce viewership and commercial revenue. At the same time, federation analysts warn that overriding the AI might lead to a weaker squad and lower chances of international success.

Players begin asking a deeper question: if careers, national pride, and millions in revenue are at stake, should final decisions follow data optimization or remain a human responsibility?

The federation must now decide how much authority the AI system should have in selecting the national team.`,
  choices: [
    {
      label: "Choice A",
      text: "Follow the AI squad recommendation.",
      subtext: "Maximizing performance and reducing bias may justify delegating even career-defining decisions to advanced systems.",
      side: "robots",
      ethics: "utilitarian"
    },
    {
      label: "Choice B",
      text: "Allow human override of AI decisions.",
      subtext: "National representation and professional futures should not depend on opaque algorithmic judgments alone.",
      side: "abacus",
      ethics: "deontological"
    }
  ]
},
      {
  title: "Scenario 8: The AI Fan Remix Explosion",
  dimension: "copyright",
  body: `A new generative AI tool becomes wildly popular on a major gaming platform.

Players can create custom “skins” (visual modifications that change how characters or items look) as well as music tracks and in-game performances in the style of famous artists.

Within weeks, the platform is flooded with fan-made content inspired by global pop stars. One viral example features a game character performing a song that sounds uncannily like it was written and sung by Taylor Swift, even though she was never involved.

Players love it. Creativity and engagement skyrocket.

But artists and their management teams push back. They argue that their voice, aesthetic style, and artistic identity are being copied without permission. Some warn that if this becomes normal, creators may lose control over how their image and sound are used in digital worlds.

The platform must decide how to regulate the technology.`,
  choices: [
    {
      label: "Choice A",
      text: "Allow open AI remix culture.",
      subtext: "Fan creativity and innovation should not be restricted by strict ownership rules in interactive environments.",
      side: "robots",
      ethics: "utilitarian"
    },
    {
      label: "Choice B",
      text: "Require artist consent.",
      subtext: "A performer’s voice and artistic style are part of their identity and should not be replicated without permission.",
      side: "abacus",
      ethics: "deontological"
    }
  ]
}, 
      {
  title: "Scenario 9: Barbie 2",
  dimension: "jobs",
  body: `After the massive global success of the first Barbie movie, the studio announces plans for a sequel.

However, this time production will rely heavily on AI-driven tools. Advanced systems can now generate background performances, assist with script drafting, automate dubbing and localization, and simulate parts of set design and post-production.

Executives estimate that nearly 60% of the creative and technical roles involved in the first movie will no longer be needed. The studio argues that this shift will significantly reduce costs, allowing more films to be produced, ticket prices to remain affordable, and global audiences to access content more quickly in their own languages.

Some investors and policymakers describe the transition as a natural step in technological progress within a competitive entertainment industry.

At the same time, unions and industry workers warn that large-scale displacement could permanently weaken creative career pathways. They argue that if entry-level and mid-tier roles disappear, future generations may struggle to enter moviemaking at all.

The government must decide whether to intervene or allow studios to move forward with AI-driven production.`,
  choices: [
    {
      label: "Choice A",
      text: "Allow the studio to adopt AI production at scale.",
      subtext: "If technological change increases overall cultural access, affordability, and industry competitiveness, workforce disruption may be ethically justified.",
      side: "robots",
      ethics: "utilitarian"
    },
    {
      label: "Choice B",
      text: "Regulate or slow the transition.",
      subtext: "Creative industries should protect human careers and artistic ecosystems, even if innovation becomes less efficient.",
      side: "abacus",
      ethics: "deontological"
    }
  ]

    ];

    let currentScreen = "intro";
    let currentScenario = 0;
    const answers = [];

    function updateProgress() {
      const fill = document.getElementById("progressFill");
      const label = document.getElementById("progressLabel");
      const count = document.getElementById("progressCount");

      if (currentScreen === "intro") {
        fill.style.width = "0%";
        label.textContent = "Introduction";
        count.textContent = "0 / 12";
      } else if (currentScreen === "instructions") {
        fill.style.width = "0%";
        label.textContent = "Instructions";
        count.textContent = "0 / 12";
      } else if (currentScreen === "scenario") {
        const shown = currentScenario + 1;
        fill.style.width = `${(currentScenario / scenarios.length) * 100}%`;
        label.textContent = scenarios[currentScenario].title;
        count.textContent = `${shown} / ${scenarios.length}`;
      } else if (currentScreen === "results") {
        fill.style.width = "100%";
        label.textContent = "Results";
        count.textContent = `${scenarios.length} / ${scenarios.length}`;
      }
    }

    function renderIntro() {
      currentScreen = "intro";
      updateProgress();

      document.getElementById("app").innerHTML = `
        <h2 class="screen-title">You have been appointed to an emergency ethics task force advising the global gaming and entertainment industry.</h2>

        <p class="lead">
          New AI systems are being rolled out across game design, player analytics, content creation, moderation, and platform governance.
        </p>

        <p class="mandate">
Your mandate is simple, but brutal: make decisions no one else wants to make.
</p>

        <p class="lead">
          In every case, you will face a hard choice between competing values. No option is clean. No outcome is without cost.
        </p>

        <p class="lead">
          As you decide, the system will evaluate your choices across two layers:
        </p>

        <div class="section-label">1. Your AI Governance Profile</div>
        <p class="lead">
          Artificial intelligence is often seen as both a promise and a risk.
        </p>
        <p class="lead">
          In this simulation, these perspectives are represented by two lenses:
        </p>
        <p class="lead">
          <strong>ROBOTS:</strong> emphasizing the opportunities and benefits of AI.<br>
          <strong>ABACUS:</strong> emphasizing the risks and ethical challenges of AI.
        </p>
        <p class="lead">
          Your choices throughout the scenarios will reveal which perspective your decisions lean toward. After completing the simulation, the full meaning of these frameworks will be revealed.
        </p>

        <div class="section-label">2. Your Moral Reasoning Profile</div>
        <p class="lead">
          Do you tend to justify decisions through:
        </p>
        <p class="lead">
          <strong>Utilitarian reasoning:</strong> maximizing overall welfare and outcomes<br>
          <strong>Deontological reasoning:</strong> protecting rights, duties, and moral limits even when outcomes suffer
        </p>

        <p class="lead">
          <strong>You are not being tested on what is “correct”.</strong><br>
          The question is which values you prioritize when difficult trade-offs arise.
        </p>

        <div class="button-row">
          <button class="primary-btn" onclick="beginSimulation(this)">Press Begin</button>
        </div>
      `;
    }

    function renderInstructions() {
      currentScreen = "instructions";
      updateProgress();

      document.getElementById("app").innerHTML = `
        <div class="instructions-layout">
          <div>
            <h2 class="screen-title">Instructions</h2>
            <p class="lead">${instructionsText.replace(/\n/g, "<br>")}</p>
            <div class="button-row">
              <button class="secondary-btn" onclick="renderIntro()">Back</button>
              <button class="primary-btn" onclick="startFirstScenario(this)">Start Scenario 1</button>
            </div>
          </div>

          <div class="instructions-image-box">
            <img src="images_AI_image_introduction.jpeg" alt="AI introduction image">
          </div>
        </div>
      `;
    }

    function renderScenario() {
      currentScreen = "scenario";
      updateProgress();

      const s = scenarios[currentScenario];
      document.getElementById("app").innerHTML = `
        <div class="scenario-meta">${s.title}</div>
        <h2 class="screen-title">${dimensionDescriptions[s.dimension].name}</h2>
        <div class="scenario-body">${s.body}</div>

        <div class="choice-grid">
          ${s.choices.map((choice, index) => `
            <button class="choice-btn" onclick="selectChoice(${index})">
              <div class="choice-title">${choice.label}: ${choice.text}</div>
              <div class="choice-subtext">${choice.subtext}</div>
            </button>
          `).join("")}
        </div>
      `;
      window.scrollTo({
        top: 0,
        behavior: "smooth"});
    }

    function selectChoice(index) {
      const s = scenarios[currentScenario];
      const choice = s.choices[index];

      answers.push({
        dimension: s.dimension,
        side: choice.side,
        ethics: choice.ethics
      });

      currentScenario++;

      if (currentScenario < scenarios.length) {
        renderScenario();
      } else {
        renderResults();
      }
    }

    function beginSimulation(btn) {
      btn.disabled = true;
      btn.classList.add("button-glow");
      setTimeout(() => {
        renderInstructions();
      }, 450);
    }

    function startFirstScenario(btn) {
      btn.disabled = true;
      btn.classList.add("button-glow");
      setTimeout(() => {
        renderScenario();
      }, 450);
    }

    function getDimensionResult(dimensionKey) {
      const subset = answers.filter(a => a.dimension === dimensionKey);
      if (subset.length === 0) return "balanced";

      const robotsCount = subset.filter(a => a.side === "robots").length;
      const abacusCount = subset.filter(a => a.side === "abacus").length;

      if (robotsCount > abacusCount) return "robots";
      if (abacusCount > robotsCount) return "abacus";
      return "balanced";
    }

    function renderResults() {
      currentScreen = "results";
      updateProgress();

      const robotsTotal = answers.filter(a => a.side === "robots").length;
      const abacusTotal = answers.filter(a => a.side === "abacus").length;
      const utilTotal = answers.filter(a => a.ethics === "utilitarian").length;
      const deonTotal = answers.filter(a => a.ethics === "deontological").length;

      const utilPercent = Math.round((utilTotal / answers.length) * 100);
      const deonPercent = Math.round((deonTotal / answers.length) * 100);

      let ethicsHeadline = "";
      let ethicsText = "";

      if (utilTotal > deonTotal) {
        ethicsHeadline = "Your moral reasoning leans utilitarian.";
        ethicsText = "Across the scenarios, you tended to justify decisions by their consequences. You were more willing to tolerate discomfort, trade-offs, and the disregard of some individual concerns when doing so appeared to increase overall welfare, safety, or efficiency. In your reasoning, the hardest question is usually: What produces the best outcome for the greatest number?";
      } else if (deonTotal > utilTotal) {
        ethicsHeadline = "Your moral reasoning leans deontological.";
        ethicsText = "Across the scenarios, you tended to emphasize duties, rights, and moral limits. You were less willing to violate core principles such as consent, fairness, human dignity, or non-manipulation, even when doing so might have improved outcomes overall. In your reasoning, the hardest question is usually: What must never be done, even for a good result?";
      } else {
        ethicsHeadline = "Your moral reasoning is evenly split.";
        ethicsText = "You moved between outcome-based and duty-based thinking depending on the context. In some cases, you prioritized welfare and collective benefit; in others, you treated rights and moral boundaries as non-negotiable.";
      }

      const dimensionCards = Object.entries(dimensionDescriptions).map(([key, value]) => {
        const result = getDimensionResult(key);
        const label = result === "robots" ? "ROBOTS leaning" : result === "abacus" ? "ABACUS leaning" : "Balanced";
        return `
          <div class="dim-card">
            <h4>${value.name}</h4>
            <div class="lean ${result}">${label}</div>
            <div class="muted">${value[result]}</div>
          </div>
        `;
      }).join("");

      document.getElementById("app").innerHTML = `
        <h2 class="screen-title">YOUR AI GOVERNANCE PROFILE</h2>

        <div class="stat-row">
          <div class="stat-box">
            <div class="label">ROBOTS choices</div>
            <div class="value">${robotsTotal}</div>
          </div>
          <div class="stat-box">
            <div class="label">ABACUS choices</div>
            <div class="value">${abacusTotal}</div>
          </div>
          <div class="stat-box">
            <div class="label">Utilitarian</div>
            <div class="value">${utilPercent}%</div>
          </div>
          <div class="stat-box">
            <div class="label">Deontological</div>
            <div class="value">${deonPercent}%</div>
          </div>
        </div>

        <div class="section-label">Dimension Breakdown</div>
        <div class="dim-grid">${dimensionCards}</div>

        <div class="section-label">Ethics Result</div>
        <p class="lead"><strong>${ethicsHeadline}</strong></p>
        <p class="lead">${ethicsText}</p>

        <div class="section-label">Closing Reflection</div>
        <p class="lead">
          No profile produced here is “the correct one.”<br>
          That is the point.<br><br>
          The ethics of AI is not a battle between obvious good and obvious evil. It is a struggle between values that often collide: welfare and rights, innovation and restraint, precision and justice, empowerment and control.<br><br>
          You have now seen what kind of trade-offs your own reasoning tends to permit.<br>
          The real question is whether you are comfortable living in the AI system your choices just created.
        </p>

        <div class="button-row">
          <button class="secondary-btn" onclick="restartSimulation()">Restart Simulation</button>
        </div>
      `;
    }

    function restartSimulation() {
      currentScenario = 0;
      answers.length = 0;
      renderIntro();
    }

    renderIntro();
  </script>
</body>
</html>
